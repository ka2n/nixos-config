
[cursor.style]
blinking = "Always"
shape = "Block"

[bell]
command = { program = "paplay", args = ["/run/current-system/sw/share/sounds/freedesktop/stereo/bell.oga"] }

[env]
GLFW_IM_MODULE = "ibus"

[font]
size = 12.0

[font.normal]
# 日本語にほんご
#family = "Moralerspace Argon"
family = "Cica"
style = "Regular"

[window]
decorations = "none"
dynamic_padding = true
dynamic_title = true
opacity = 0.98

[window.padding]
x = 3
y = 3

[scrolling]
history = 10000
multiplier = 3

[general]
live_config_reload = true
import = ["./nord.toml"]

# Alacritty does not implement modifyOtherKeys (#3101) and only enables KKP
# on application request, so Shift/Ctrl+Enter etc. fall through as bare CR.
# Send CSI-u sequences explicitly so tmux extended-keys can carry them.
[keyboard]
bindings = [
  { key = "Return",    mods = "Shift",   chars = "\u001b[13;2u" },
  { key = "Return",    mods = "Control", chars = "\u001b[13;5u" },
  { key = "Backspace", mods = "Control", chars = "\u001b[127;5u" },
  { key = "Space",     mods = "Control", chars = "\u001b[32;5u"  },
]
